<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="MedocBills offers professional medical billing services, claim management, and healthcare revenue solutions. Simplify your billing process with our expert team." />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <title>Medocbills</title>
  
  <!-- Preconnect to font origins (reduces connection time by ~200ms) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  
  <!-- Load Poppins without render-blocking -->
  <link 
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" 
    rel="stylesheet" 
    media="print" 
    onload="this.media='all'"
  />
  
  <!-- Brooklyn font - loaded without blocking render -->
  <link 
    href="https://db.onlinewebfonts.com/c/31PDx4Vtw4YF6XfduRwwS6nKZ6sPAC9nCeR?family=Brooklyn" 
    rel="stylesheet" 
    type="text/css" 
    media="print" 
    onload="this.media='all'"
  />
  
  <!-- Fallback in case font doesn't load -->
  <style>
    /* Text is visible immediately with fallback font */
    body {
      font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    
    h1, h2, h3, h4, h5, h6, .brooklyn {
      font-family: 'Brooklyn', 'Poppins', system-ui, sans-serif;
    }
    
    /* Critical CSS for above-the-fold content */
    .sticky-top { position: sticky; top: 0; z-index: 50; }
    .bg-white { background-color: white; }
  </style>
  
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://db.onlinewebfonts.com/c/31PDx4Vtw4YF6XfduRwwS6nKZ6sPAC9nCeR?family=Brooklyn" rel="stylesheet" />
  </noscript>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
